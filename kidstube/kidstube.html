<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KidsTube">
<title>KidsTube</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17; --card: #1e1b30;
  --a1:#ff6b6b; --a2:#ffd93d; --a3:#6bcb77; --a4:#4d96ff; --a5:#ff9f1c; --a6:#c77dff; --a7:#ff6bce;
  --text:#f5f0ff; --sub:#9b97b2; --r:18px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); }

/* Each screen fills the viewport via fixed positioning */
.screen { display:none; position:fixed; inset:0; flex-direction:column; background:var(--bg); }
.screen.active { display:flex; }

/* Topbar */
.topbar {
  display:flex; align-items:center; gap:12px; padding:14px 16px;
  background:rgba(15,14,23,0.96); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0;
}
.topbar-title { font-family:'Fredoka One',cursive; font-size:1.1rem; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.back-btn {
  width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.1);
  border:none; color:white; font-size:1.2rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.back-btn:active { background:rgba(255,255,255,0.22); }

/* Scroll container: fills remaining space below topbar */
.scroll-area {
  flex:1;              /* take remaining height */
  min-height:0;        /* critical: allow flex child to shrink */
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* ── HOME ── */
.home-header { text-align:center; padding:44px 20px 20px; }
.home-logo {
  font-family:'Fredoka One',cursive; font-size:2.6rem;
  background:linear-gradient(135deg,var(--a2),var(--a1));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  display:block; margin-bottom:6px;
}
.home-sub { font-size:0.9rem; color:var(--sub); font-weight:600; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; padding:8px 16px 40px; max-width:480px; margin:0 auto; }
.ch-card {
  background:var(--card); border-radius:var(--r); padding:22px 12px 16px;
  display:flex; flex-direction:column; align-items:center; gap:9px;
  cursor:pointer; border:2px solid transparent; transition:transform .14s, border-color .14s;
  animation:fadeUp .35s ease both;
}
.ch-card:active { transform:scale(0.93); border-color:var(--clr); }
.ch-card.wide { grid-column:span 2; flex-direction:row; padding:16px 22px; gap:16px; justify-content:flex-start; }
.ch-card.wide .ch-name { text-align:left; font-size:1.1rem; }
.ch-emoji { font-size:2.4rem; line-height:1; }
.ch-name { font-family:'Fredoka One',cursive; font-size:1rem; text-align:center; line-height:1.2; }
.ch-tag { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.4px; color:var(--clr); background:rgba(255,255,255,0.07); padding:2px 8px; border-radius:20px; }
.c1{--clr:var(--a1)} .c2{--clr:var(--a2)} .c3{--clr:var(--a3)} .c4{--clr:var(--a4)} .c5{--clr:var(--a5)} .c6{--clr:var(--a6)} .c7{--clr:var(--a7)}
.ch-card:nth-child(1){animation-delay:.04s} .ch-card:nth-child(2){animation-delay:.08s}
.ch-card:nth-child(3){animation-delay:.12s} .ch-card:nth-child(4){animation-delay:.16s}
.ch-card:nth-child(5){animation-delay:.20s} .ch-card:nth-child(6){animation-delay:.24s}
.ch-card:nth-child(7){animation-delay:.28s}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ── VIDEO LIST ── */
.video-count { text-align:center; padding:10px 0 4px; font-size:.82rem; color:var(--sub); font-weight:600; }
.video-item {
  display:flex; gap:12px; padding:10px 14px; cursor:pointer;
  border-radius:12px; margin:0 6px 2px; transition:background .12s; align-items:flex-start;
}
.video-item:active { background:rgba(255,255,255,0.07); }
.thumb-wrap { position:relative; flex-shrink:0; border-radius:10px; overflow:hidden; width:140px; height:79px; background:#2a2640; }
.thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.play-circle { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .12s; }
.video-item:active .play-circle { opacity:1; }
.play-circle span { font-size:1.8rem; }
.video-info { flex:1; min-width:0; }
.video-title { font-size:.86rem; font-weight:700; line-height:1.35; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.video-date { font-size:.72rem; color:var(--sub); margin-top:5px; }

/* ── STATES ── */
.spinner { display:flex; align-items:center; justify-content:center; padding:64px 20px; gap:10px; color:var(--sub); }
.spin { width:22px; height:22px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--a4); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.err { text-align:center; padding:48px 24px; color:var(--sub); line-height:1.7; }
.err strong { display:block; font-size:2rem; margin-bottom:8px; }
.retry-btn { margin-top:8px; padding:10px 20px; background:#4d96ff; border:none; border-radius:50px; color:white; font-size:.95rem; cursor:pointer; }

/* ── PLAYER ── */
#player { background:#000; }
.player-video-wrap { flex-shrink:0; width:100%; aspect-ratio:16/9; background:#000; }
#yt-frame { width:100%; height:100%; border:none; display:block; }
.player-info { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 16px 32px; background:var(--bg); }
.pl-title { font-family:'Fredoka One',cursive; font-size:1.1rem; line-height:1.3; margin-bottom:5px; }
.pl-date { font-size:.75rem; color:var(--sub); }
.pl-desc { font-size:.82rem; color:var(--sub); line-height:1.55; margin-top:10px; display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical; overflow:hidden; }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="scroll-area">
    <div class="home-header">
      <span class="home-logo">🌟 KidsTube</span>
      <span class="home-sub">What do you want to watch?</span>
    </div>
    <div class="grid">
      <div class="ch-card c1" onclick="loadChannel(0)"><div class="ch-emoji">✈️</div><div class="ch-name">Sam Chui</div><div class="ch-tag">Aviation</div></div>
      <div class="ch-card c2" onclick="loadChannel(1)"><div class="ch-emoji">🐻</div><div class="ch-name">Смешарики</div><div class="ch-tag">Мультики</div></div>
      <div class="ch-card c3" onclick="loadChannel(2)"><div class="ch-emoji">🎬</div><div class="ch-name">Riki Group</div><div class="ch-tag">Animation</div></div>
      <div class="ch-card c4" onclick="loadChannel(3)"><div class="ch-emoji">🎙️</div><div class="ch-name">Арестович</div><div class="ch-tag">Розмови</div></div>
      <div class="ch-card c5" onclick="loadChannel(4)"><div class="ch-emoji">🎵</div><div class="ch-name">Дети FM</div><div class="ch-tag">Music</div></div>
      <div class="ch-card c6" onclick="loadChannel(5)"><div class="ch-emoji">📺</div><div class="ch-name">Classic Cartoons</div><div class="ch-tag">Vintage</div></div>
      <div class="ch-card c7 wide" onclick="loadChannel(6)"><div class="ch-emoji">🌍</div><div><div class="ch-name">Discovery</div><div class="ch-tag">Documentary</div></div></div>
    </div>
  </div>
</div>

<!-- VIDEO LIST -->
<div id="videolist" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="topbar-title" id="vl-title"></div>
  </div>
  <div class="scroll-area" id="vl-scroll"></div>
</div>

<!-- PLAYER -->
<div id="player" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goVideoList()">←</button>
    <div class="topbar-title" id="pl-channel"></div>
  </div>
  <div class="player-video-wrap">
    <iframe id="yt-frame" allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </div>
  <div class="player-info">
    <div class="pl-title" id="pl-title"></div>
    <div class="pl-date" id="pl-date"></div>
    <div class="pl-desc" id="pl-desc"></div>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyBF9c9WGvuGbvHh7YLYIUBJdUiqGzXqNwg';
const CHANNELS = [
  { name:'Sam Chui',         handle:'samchui',              emoji:'✈️' },
  { name:'Смешарики',        handle:'smeshariki',           emoji:'🐻' },
  { name:'Riki Group',       handle:'riki',                 emoji:'🎬' },
  { name:'Арестович',        handle:'arestovych',           emoji:'🎙️' },
  { name:'Дети FM',          handle:'detifm',               emoji:'🎵' },
  { name:'Classic Cartoons', handle:'classiccartoonsmedia', emoji:'📺' },
  { name:'Discovery',        handle:'discovery',            emoji:'🌍' },
];

const playlistCache = {};
let currentIdx = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome()      { stopVideo(); showScreen('home'); }
function goVideoList() { stopVideo(); showScreen('videolist'); }
function stopVideo()   { document.getElementById('yt-frame').src = 'about:blank'; }

async function loadChannel(idx) {
  currentIdx = idx;
  const ch = CHANNELS[idx];
  document.getElementById('vl-title').textContent = ch.emoji + ' ' + ch.name;
  const scroll = document.getElementById('vl-scroll');
  scroll.innerHTML = '<div class="spinner"><div class="spin"></div> Loading…</div>';
  showScreen('videolist');
  try {
    const pid = await getUploadPlaylist(ch.handle);
    const videos = await fetchAllVideos(pid, scroll);
    renderList(videos, scroll);
  } catch(e) {
    scroll.innerHTML = `<div class="err"><strong>😕</strong>Could not load videos.<br><small>${esc(e.message)}</small><br><button class="retry-btn" onclick="loadChannel(${idx})">Retry</button></div>`;
  }
}

async function getUploadPlaylist(handle) {
  if (playlistCache[handle]) return playlistCache[handle];
  const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=${handle}&key=${API_KEY}`);
  const d = await r.json();
  if (d.error) throw new Error(`API ${d.error.code}: ${d.error.message}`);
  if (!d.items?.length) throw new Error(`Channel not found: @${handle}`);
  playlistCache[handle] = d.items[0].contentDetails.relatedPlaylists.uploads;
  return playlistCache[handle];
}

async function fetchAllVideos(pid, scroll) {
  const MAX = 200;
  let all = [], token = null;
  do {
    scroll.innerHTML = `<div class="spinner"><div class="spin"></div> Loading… (${all.length} videos)</div>`;
    let url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${pid}&key=${API_KEY}`;
    if (token) url += '&pageToken=' + token;
    const r = await fetch(url);
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    const page = (d.items || [])
      .filter(i => !['Private video','Deleted video'].includes(i.snippet.title))
      .map(i => ({
        id:    i.snippet.resourceId.videoId,
        title: i.snippet.title,
        thumb: (i.snippet.thumbnails.medium || i.snippet.thumbnails.default || {}).url || '',
        date:  i.snippet.publishedAt,
        desc:  i.snippet.description || '',
      }));
    all = all.concat(page);
    token = all.length < MAX ? (d.nextPageToken || null) : null;
  } while (token);
  return all.slice(0, MAX);
}

function renderList(videos, scroll) {
  scroll.innerHTML = '';
  if (!videos.length) { scroll.innerHTML = '<div class="err">No videos found.</div>'; return; }
  const count = document.createElement('div');
  count.className = 'video-count';
  count.textContent = videos.length + ' videos';
  scroll.appendChild(count);
  videos.forEach(v => {
    const el = document.createElement('div');
    el.className = 'video-item';
    el.innerHTML = `
      <div class="thumb-wrap">
        <img src="${esc(v.thumb)}" loading="lazy" alt="">
        <div class="play-circle"><span>▶️</span></div>
      </div>
      <div class="video-info">
        <div class="video-title">${esc(v.title)}</div>
        <div class="video-date">${fmt(v.date)}</div>
      </div>`;
    el.onclick = () => playVideo(v);
    scroll.appendChild(el);
  });
}

function playVideo(v) {
  const ch = CHANNELS[currentIdx];
  document.getElementById('pl-channel').textContent = ch.emoji + ' ' + ch.name;
  document.getElementById('pl-title').textContent   = v.title;
  document.getElementById('pl-date').textContent    = fmt(v.date);
  document.getElementById('pl-desc').textContent    = v.desc;
  document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1`;
  showScreen('player');
}

function fmt(iso) { return iso ? new Date(iso).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) : ''; }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

history.pushState({}, '');
window.addEventListener('popstate', () => {
  const id = document.querySelector('.screen.active')?.id;
  if (id === 'player')    { goVideoList(); history.pushState({}, ''); }
  else if (id === 'videolist') { goHome(); history.pushState({}, ''); }
});
</script>
</body>
</html>
